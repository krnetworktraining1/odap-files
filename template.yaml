- cloudInitNoCloud:
    userData: |
      #cloud-config
      user: ferrni
      password: redhat
      chpasswd:
        expire: false

      ssh_authorized_keys:
        - ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQD...

      yum_repos:
        baseos:
          baseurl: http://content.example.com/rhel9.5/x86_64/dvd/BaseOS
          gpgcheck: false
          enabled: true
          name: BaseOS Packages

        appstream:
          baseurl: http://content.example.com/rhel9.5/x86_64/dvd/AppStream
          gpgcheck: false
          enabled: true
          name: AppStream Packages

      runcmd:
        - dnf install -y httpd php
        - systemctl enable --now httpd
        - echo "TESTING PAGE" > /var/www/html/index.html

    name: cloudinitdisk
